name: Android Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build Android APK (x86_64)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android SDK command-line tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends wget unzip
          mkdir -p $HOME/Android/cmdline-tools
          curl -o /tmp/cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-110.0.0_latest.zip
          unzip -q /tmp/cmdline-tools.zip -d $HOME/Android/cmdline-tools
          mkdir -p $HOME/Android/Sdk/cmdline-tools/latest
          mv $HOME/Android/cmdline-tools/cmdline-tools/* $HOME/Android/Sdk/cmdline-tools/latest/
          echo "export ANDROID_SDK_ROOT=$HOME/Android/Sdk" >> $GITHUB_ENV
          echo "export ANDROID_HOME=$HOME/Android/Sdk" >> $GITHUB_ENV
          echo "export PATH=$PATH:$HOME/Android/Sdk/cmdline-tools/latest/bin:$HOME/Android/Sdk/platform-tools" >> $GITHUB_ENV

      - name: Install Android platform and NDK
        run: |
          yes | sdkmanager --sdk_root=$HOME/Android/Sdk "platform-tools" "platforms;android-31" "build-tools;31.0.0" "ndk;23.2.8568313"

      - name: Install Rust and targets
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          components: rustfmt, clippy
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Install cargo-apk
        run: cargo install cargo-apk --force

      - name: Android build via cargo-apk
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_ROOT: $HOME/Android/Sdk/ndk/23.2.8568313
        run: |
          cargo +stable run --manifest-path .tools/cargo-apk/Cargo.toml -- apk build --profile android-debug --package mobile --target x86_64-linux-android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: target/x86_64-linux-android/android-debug/apk
