name: Build Android APK

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      smoke_test:
        description: "Run Android emulator smoke test"
        required: false
        default: false
        type: boolean

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUST_LOG: debug

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Cache Rust Build Artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            crates/mobile -> target
          cache-on-failure: true

      - name: Install Dependencies
        run: |
          rustup target add aarch64-linux-android
          rustup target add x86_64-linux-android
          if ! command -v cargo-apk >/dev/null 2>&1; then
            cargo install cargo-apk
          else
            echo "cargo-apk already installed, skipping"
          fi

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK Components
        run: |
          ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;36.0.0"

      - name: Install Android NDK
        run: |
          ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager "ndk;26.3.11579264"

      - name: Create Debug Keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "C=US, O=Android, CN=Android Debug"

      - name: Build APK (Debug)
        run: |
          set -euxo pipefail
          export ANDROID_HOME="${ANDROID_SDK_ROOT}"
          export ANDROID_NDK_ROOT="${ANDROID_HOME}/ndk/26.3.11579264"
          export NDK_HOME="${ANDROID_NDK_ROOT}"
          cargo apk build --profile android-debug --package mobile 2>&1 | tee /tmp/ethertia-build.log

      - name: Verify APK Build Output
        run: |
          echo "Checking APK files in target directory..."
          find target/android-debug/apk/ -type f -name "*.apk" -o -name "*unaligned*"
          ls -lah target/android-debug/apk/ || ls -lah target/release/apk/ || echo "No APK directory found"

      - name: Sign and Align APK
        run: |
          ZIPALIGN="${ANDROID_SDK_ROOT}/build-tools/36.0.0/zipalign"
          APKSIGNER="${ANDROID_SDK_ROOT}/build-tools/36.0.0/apksigner"
          
          # Check both possible locations for unaligned APK
          UNALIGNED=""
          if [ -f "target/android-debug/apk/ethertia-unaligned.apk" ]; then
            UNALIGNED="target/android-debug/apk/ethertia-unaligned.apk"
          elif [ -f "target/release/apk/ethertia-unaligned.apk" ]; then
            UNALIGNED="target/release/apk/ethertia-unaligned.apk"
          else
            echo "ERROR: No unaligned APK found!"
            exit 1
          fi
          
          ALIGNED="${UNALIGNED%/*}/ethertia-aligned.apk"
          FINAL="${UNALIGNED%/*}/ethertia-debug.apk"
          
          echo "Processing: $UNALIGNED"
          echo "Output: $FINAL"
          
          "$ZIPALIGN" -f -v 4 "$UNALIGNED" "$ALIGNED"
          "$APKSIGNER" sign --ks ~/.android/debug.keystore \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out "$FINAL" "$ALIGNED"
          "$APKSIGNER" verify --verbose "$FINAL"
          
          ls -lah "$FINAL"

      - name: Android Emulator Smoke Test
        if: github.event_name == 'workflow_dispatch' && inputs.smoke_test == true
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          target: google_apis
          profile: pixel_5
          emulator-boot-timeout: 900
          disable-linux-hw-accel: true
          emulator-options: -no-snapshot -noaudio -no-boot-anim -gpu swiftshader_indirect -camera-back none -camera-front none
          disable-animations: true
          script: |
            set +e
            FAIL=0

            # Always create files so artifact upload is stable, even on early failures.
            : > /tmp/ethertia-logcat.txt
            : > /tmp/ethertia-logcat-crash.txt
            : > /tmp/ethertia-pid.txt
            : > /tmp/ethertia-bootlog.txt
            : > /tmp/ethertia-bootlog.err
            : > /tmp/ethertia-emulator-debug.txt

            APK="target/android-debug/apk/ethertia-debug.apk"
            if [ ! -f "$APK" ]; then
              APK="target/release/apk/ethertia-debug.apk"
            fi

            adb devices -l > /tmp/ethertia-emulator-debug.txt 2>&1 || true

            adb wait-for-device || FAIL=1
            for i in $(seq 1 120); do
              BOOT_STATUS=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r' || true)
              if [ "$BOOT_STATUS" = "1" ]; then
                echo "Emulator boot completed."
                break
              fi
              sleep 2
            done

            BOOT_STATUS=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r' || true)
            if [ "$BOOT_STATUS" != "1" ]; then
              echo "Emulator did not report boot completed." >> /tmp/ethertia-emulator-debug.txt
              FAIL=1
            fi

            echo "Installing $APK"
            adb install -r "$APK" >> /tmp/ethertia-emulator-debug.txt 2>&1 || FAIL=1

            adb logcat -c || true
            adb shell am start -W com.ethertia.client/android.app.NativeActivity >> /tmp/ethertia-emulator-debug.txt 2>&1 || FAIL=1
            sleep 12

            adb shell run-as com.ethertia.client sh -c 'cat files/ethertia_boot.log' > /tmp/ethertia-bootlog.txt 2>/tmp/ethertia-bootlog.err || true

            adb logcat -d > /tmp/ethertia-logcat.txt 2>> /tmp/ethertia-emulator-debug.txt || true
            grep -E "FATAL EXCEPTION|SIGSEGV|panic|PANIC|Abort message|AndroidRuntime" /tmp/ethertia-logcat.txt > /tmp/ethertia-logcat-crash.txt || true
            adb shell pidof -s com.ethertia.client > /tmp/ethertia-pid.txt 2>> /tmp/ethertia-emulator-debug.txt || true

            if ! test -s /tmp/ethertia-pid.txt; then
              echo "App process is not running after launch."
              tail -n 200 /tmp/ethertia-logcat.txt || true
              FAIL=1
            fi

            if grep -E "FATAL EXCEPTION|SIGSEGV|panic|PANIC|Abort message" /tmp/ethertia-logcat.txt; then
              echo "Crash signatures detected in logcat."
              FAIL=1
            fi

            echo "Smoke test passed: app launched and stayed alive."

            if [ "$FAIL" -ne 0 ]; then
              exit 1
            fi

      - name: Collect Build Diagnostics
        if: always()
        run: |
          set +e
          mkdir -p /tmp/ethertia-debug

          # Base environment and toolchain snapshot
          uname -a > /tmp/ethertia-debug/uname.txt
          rustc -Vv > /tmp/ethertia-debug/rustc-version.txt
          cargo -V > /tmp/ethertia-debug/cargo-version.txt
          cargo apk --version > /tmp/ethertia-debug/cargo-apk-version.txt 2>&1
          env | sort | grep -E 'ANDROID|RUST|CARGO|NDK|JAVA' > /tmp/ethertia-debug/env-android-rust.txt || true

          # Persist full build log when available
          if [ -f /tmp/ethertia-build.log ]; then
            cp /tmp/ethertia-build.log /tmp/ethertia-debug/build.log
          fi

          # Collect APK and output layout information
          find target -maxdepth 5 -type f \( -name '*.apk' -o -name '*.so' -o -name '*unaligned*' \) | sort > /tmp/ethertia-debug/target-files.txt || true
          ls -R target/android-debug/apk > /tmp/ethertia-debug/apk-dir-tree.txt 2>&1 || true
          ls -R target/release/apk > /tmp/ethertia-debug/apk-dir-tree-release.txt 2>&1 || true

          APK="target/android-debug/apk/ethertia-debug.apk"
          if [ ! -f "$APK" ]; then
            APK="target/release/apk/ethertia-debug.apk"
          fi

          if [ -f "$APK" ]; then
            unzip -l "$APK" > /tmp/ethertia-debug/apk-contents.txt 2>&1 || true
          fi

          # Native library metadata helps diagnose strip/symbol issues
          find target -type f -name 'libmobile.so' > /tmp/ethertia-debug/libmobile-locations.txt 2>&1 || true
          LIB_SO=$(head -n 1 /tmp/ethertia-debug/libmobile-locations.txt)
          if [ -n "$LIB_SO" ] && [ -f "$LIB_SO" ]; then
            file "$LIB_SO" > /tmp/ethertia-debug/libmobile-file.txt 2>&1 || true
            readelf -h "$LIB_SO" > /tmp/ethertia-debug/libmobile-elf-header.txt 2>&1 || true
          fi

      - name: Upload Build Diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-diagnostics
          path: /tmp/ethertia-debug
          if-no-files-found: warn

      - name: Upload Raw Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-log
          path: /tmp/ethertia-build.log
          if-no-files-found: warn

      - name: Upload Smoke Test Logcat
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-smoke-logcat
          path: |
            /tmp/ethertia-logcat.txt
            /tmp/ethertia-logcat-crash.txt
            /tmp/ethertia-pid.txt
            /tmp/ethertia-bootlog.txt
            /tmp/ethertia-bootlog.err
            /tmp/ethertia-emulator-debug.txt
          if-no-files-found: warn

      - name: Write Diagnostic Summary
        if: always()
        run: |
          {
            echo "## Android CI Diagnostics"
            echo ""
            echo "- Build log artifact: android-build-log"
            echo "- Diagnostic bundle: android-build-diagnostics"
            echo "- Smoke logcat artifact: android-smoke-logcat"
            echo ""
            echo "### Smoke Test"
            if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.smoke_test }}" = "true" ]; then
              echo "Smoke test was requested in this run."
            else
              echo "Smoke test was not requested for this run. Trigger workflow_dispatch with smoke_test=true to collect runtime crash logs."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: |
            target/android-debug/apk/ethertia-debug.apk
            target/release/apk/ethertia-debug.apk
          if-no-files-found: warn

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            target/android-debug/apk/ethertia-debug.apk
            target/release/apk/ethertia-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
