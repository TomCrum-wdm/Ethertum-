name: Build Android APK

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      smoke_test:
        description: "Run Android emulator smoke test"
        required: false
        default: false
        type: boolean

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: aarch64-linux-android

      - name: Cache Rust Build Artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            crates/mobile -> target
          cache-on-failure: true

      - name: Install Dependencies
        run: |
          rustup target add aarch64-linux-android
          if ! command -v cargo-apk >/dev/null 2>&1; then
            cargo install cargo-apk
          else
            echo "cargo-apk already installed, skipping"
          fi

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK Components
        run: |
          ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;36.0.0"

      - name: Install Android NDK
        run: |
          ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager "ndk;26.3.11579264"

      - name: Create Debug Keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "C=US, O=Android, CN=Android Debug"

      - name: Build APK (Debug)
        run: |
          export ANDROID_HOME="${ANDROID_SDK_ROOT}"
          export ANDROID_NDK_ROOT="${ANDROID_HOME}/ndk/26.3.11579264"
          export NDK_HOME="${ANDROID_NDK_ROOT}"
          cargo apk build --profile android-debug --package mobile

      - name: Verify APK Build Output
        run: |
          echo "Checking APK files in target directory..."
          find target/android-debug/apk/ -type f -name "*.apk" -o -name "*unaligned*"
          ls -lah target/android-debug/apk/ || ls -lah target/release/apk/ || echo "No APK directory found"

      - name: Sign and Align APK
        run: |
          ZIPALIGN="${ANDROID_SDK_ROOT}/build-tools/36.0.0/zipalign"
          APKSIGNER="${ANDROID_SDK_ROOT}/build-tools/36.0.0/apksigner"
          
          # Check both possible locations for unaligned APK
          UNALIGNED=""
          if [ -f "target/android-debug/apk/ethertia-unaligned.apk" ]; then
            UNALIGNED="target/android-debug/apk/ethertia-unaligned.apk"
          elif [ -f "target/release/apk/ethertia-unaligned.apk" ]; then
            UNALIGNED="target/release/apk/ethertia-unaligned.apk"
          else
            echo "ERROR: No unaligned APK found!"
            exit 1
          fi
          
          ALIGNED="${UNALIGNED%/*}/ethertia-aligned.apk"
          FINAL="${UNALIGNED%/*}/ethertia-debug.apk"
          
          echo "Processing: $UNALIGNED"
          echo "Output: $FINAL"
          
          "$ZIPALIGN" -f -v 4 "$UNALIGNED" "$ALIGNED"
          "$APKSIGNER" sign --ks ~/.android/debug.keystore \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out "$FINAL" "$ALIGNED"
          "$APKSIGNER" verify --verbose "$FINAL"
          
          ls -lah "$FINAL"

      - name: Android Emulator Smoke Test
        if: github.event_name == 'workflow_dispatch' && inputs.smoke_test == true
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: arm64-v8a
          target: google_apis
          profile: pixel_5
          disable-animations: true
          script: |
            APK="target/android-debug/apk/ethertia-debug.apk"
            if [ ! -f "$APK" ]; then
              APK="target/release/apk/ethertia-debug.apk"
            fi
            echo "Installing $APK"
            adb install -r "$APK"

            adb logcat -c
            adb shell am start -W com.ethertia.client/android.app.NativeActivity
            sleep 12

            adb logcat -d > /tmp/ethertia-logcat.txt
            adb shell pidof -s com.ethertia.client > /tmp/ethertia-pid.txt || true

            if ! test -s /tmp/ethertia-pid.txt; then
              echo "App process is not running after launch."
              tail -n 200 /tmp/ethertia-logcat.txt || true
              exit 1
            fi

            if grep -E "FATAL EXCEPTION|SIGSEGV|panic|PANIC|Abort message" /tmp/ethertia-logcat.txt; then
              echo "Crash signatures detected in logcat."
              exit 1
            fi

            echo "Smoke test passed: app launched and stayed alive."

      - name: Upload Smoke Test Logcat
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-smoke-logcat
          path: /tmp/ethertia-logcat.txt
          if-no-files-found: warn

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: |
            target/android-debug/apk/ethertia-debug.apk
            target/release/apk/ethertia-debug.apk
          if-no-files-found: warn

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            target/android-debug/apk/ethertia-debug.apk
            target/release/apk/ethertia-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
